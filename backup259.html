<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Test Adda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .hidden-panel { display: none !important; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center border-t-8 border-blue-600">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg">
                <span class="text-3xl text-white">🔑</span>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-6">ADMIN LOGIN</h2>
            <input type="password" id="admin-pass" placeholder="Password" class="w-full p-4 bg-slate-100 rounded-2xl mb-4 text-center font-bold outline-none border-2 border-transparent focus:border-blue-500 transition-all">
            <button onclick="checkPass()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-blue-700 active:scale-95 transition">UNLOCK DASHBOARD</button>
        </div>
    </div>

    <div id="admin-content" class="hidden-panel">
        <header class="bg-white border-b sticky top-0 z-50 p-4 shadow-sm">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <h1 class="font-black text-xl text-blue-700 italic">TEST ADDA <span class="text-slate-400 font-normal text-sm">ADMIN</span></h1>
                <div class="flex gap-2">
                    <button onclick="exportToExcel()" class="bg-green-600 text-white px-4 py-2 rounded-xl text-xs font-black uppercase">Excel 📊</button>
                    <button onclick="location.reload()" class="bg-slate-100 text-slate-500 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-tighter">Logout 🚪</button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-4 md:p-8">
            <div class="flex flex-wrap gap-3 mb-6">
                <div class="bg-white p-5 rounded-3xl shadow-sm flex-1 border-b-4 border-blue-500 min-w-[150px]">
                    <p class="text-[10px] font-black text-slate-400 uppercase">Total Tests</p>
                    <h3 id="stat-total" class="text-2xl font-black text-slate-800">0</h3>
                </div>
                <button onclick="clearAllData()" class="bg-red-50 text-red-600 p-5 rounded-3xl shadow-sm border-b-4 border-red-500 font-black text-xs uppercase hover:bg-red-600 hover:text-white transition">Clear All 💀</button>
            </div>

            <div class="bg-white rounded-[2rem] shadow-xl overflow-hidden border border-slate-200">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-4 text-[10px] font-black text-slate-400 uppercase">Student</th>
                                <th class="p-4 text-[10px] font-black text-slate-400 uppercase">Topic</th>
                                <th class="p-4 text-[10px] font-black text-slate-400 uppercase text-center">Score</th>
                                <th class="p-4 text-[10px] font-black text-slate-400 uppercase text-center">Delete</th>
                            </tr>
                        </thead>
                        <tbody id="results-table" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
                <div id="loading-spinner" class="p-10 text-center font-bold text-slate-300 animate-pulse italic">Connecting to Database...</div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCKTKiZVZ3GsiQDPn_8g8_Kc0LNeynK5SY",
            authDomain: "mytestadda-4628a.firebaseapp.com",
            projectId: "mytestadda-4628a",
            storageBucket: "mytestadda-4628a.firebasestorage.app",
            messagingSenderId: "423993478549",
            appId: "1:423993478549:web:614ebefa9b54a75105fa9c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.resultsData = [];

        // --- PASSWORD CHECK ---
       window.checkPass = () => {
    const input = document.getElementById('admin-pass').value.trim();
    
    // Aapka password 'Luci ko humne yahan encode kar diya hai
    // Taaki koi 'View Source' karke seedha na padh sake
    const secret = "THVjaWZlcl85OXNr"; 

    // Ye logic input ko match karega
    if (btoa(input) === secret) {
        document.getElementById('login-screen').classList.add('hidden-panel');
        document.getElementById('admin-content').classList.remove('hidden-panel');
        fetchResults();
    } else {
        alert("Galat Password! Dubara koshish karein.");
    }
};
        async function fetchResults() {
            const table = document.getElementById('results-table');
            const spinner = document.getElementById('loading-spinner');
            table.innerHTML = "";
            window.resultsData = [];
            
            try {
                const q = query(collection(db, "results"), orderBy("date", "desc"));
                const snap = await getDocs(q);
                spinner.style.display = "none";
                
                document.getElementById('stat-total').innerText = snap.size;

                snap.forEach((docSnap) => {
                    const data = docSnap.data();
                    const id = docSnap.id;
                    window.resultsData.push(data);

                    table.innerHTML += `
                        <tr class="hover:bg-blue-50/50 transition border-b border-slate-50">
                            <td class="p-4 font-black text-slate-800 text-sm">${data.student}</td>
                            <td class="p-4 text-[10px] font-bold text-slate-500 uppercase">${data.subject} <br> <span class="text-blue-500">${data.topic}</span></td>
                            <td class="p-4 text-center font-black text-green-600">${data.score}/${data.total}</td>
                            <td class="p-4 text-center">
                                <button onclick="deleteRecord('${id}')" class="text-red-400 hover:text-red-600 text-lg">🗑</button>
                            </td>
                        </tr>`;
                });
            } catch (e) { spinner.innerText = "Error: Permission Denied!"; }
        }

        // --- SINGLE DELETE ---
        window.deleteRecord = async (id) => {
            if(confirm("Delete this record?")) {
                await deleteDoc(doc(db, "results", id));
                fetchResults();
            }
        };

        // --- CLEAR ALL DATA ---
        window.clearAllData = async () => {
            if(confirm("⚠ WARNING: Kya aap saara data saaf karna chahte hain?")) {
                const snap = await getDocs(collection(db, "results"));
                const promises = snap.docs.map(d => deleteDoc(doc(db, "results", d.id)));
                await Promise.all(promises);
                alert("Database Cleared!");
                fetchResults();
            }
        };

        window.exportToExcel = () => {
            const ws = XLSX.utils.json_to_sheet(window.resultsData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Report");
            XLSX.writeFile(wb, "TestAdda_Results.xlsx");
        };
    </script>
</body>
</html>
