<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Exam Portal v5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        #palette-grid button { aspect-ratio: 1/1; border-radius: 4px; font-weight: 800; font-size: 0.8rem; }
        .status-unvisited { background-color: #3b82f6; color: white; }
        .status-not-answered { background-color: #ef4444; color: white; }
        .status-answered { background-color: #22c55e; color: white; }
        .status-review { background-color: #8b5cf6; color: white; position: relative; }
        .status-review.has-ans::after { 
            content: ''; position: absolute; top: 2px; right: 2px; width: 6px; height: 6px; 
            background: #22c55e; border-radius: 50%; border: 1px solid white; 
        }
        #theme-toggle { touch-action: none; cursor: move; width: 45px; height: 45px; z-index: 2000; }
        #palette-sidebar { transition: 0.4s ease; transform: translateX(100%); z-index: 1000; }
        #palette-sidebar.open { transform: translateX(0); }
        .hidden-view { display: none !important; }
        .section-tab.active { border-bottom: 4px solid #fff; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="bg-gray-100 dark:bg-[#121212] text-gray-900 dark:text-gray-100 font-sans overflow-hidden">

    <div id="theme-toggle" class="fixed top-20 left-4 bg-blue-600 text-white rounded-full shadow-2xl flex items-center justify-center no-print">
        <span id="theme-icon">🌙</span>
    </div>

    <div id="setup-screen" class="min-h-screen flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-2xl max-w-md w-full border-t-8 border-blue-700">
            <h1 class="text-2xl font-black text-center mb-6 text-blue-800 dark:text-blue-400">TEST ADDA LIVE</h1>
            <div class="space-y-4">
                <input type="text" id="student-id" placeholder="Student Name" class="w-full p-3 rounded-xl border-2 dark:bg-gray-700 font-bold outline-none">
                
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Select Topic/Subject</label>
                    <select id="test-topic" class="p-3 rounded-xl border-2 dark:bg-gray-700 font-bold">
                        <option value="Full Mock Test">Full Mock Test</option>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Reasoning">Reasoning</option>
                        <option value="General Awareness">General Awareness</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <select id="neg-mark" class="p-3 rounded-xl border-2 dark:bg-gray-700 font-bold">
                        <option value="0">No Negative</option>
                        <option value="0.25">0.25 Mark</option>
                    </select>
                    <input type="number" id="custom-time" value="60" class="p-3 rounded-xl border-2 dark:bg-gray-700 font-bold">
                </div>
                <button onclick="startTest()" class="w-full bg-blue-700 text-white py-4 rounded-2xl font-black shadow-lg">START TEST</button>
            </div>
        </div>
    </div>

    <div id="quiz-area" class="hidden-view h-screen flex flex-col">
        <header class="bg-blue-700 dark:bg-blue-900 text-white flex flex-col shadow-lg z-50">
            <div class="px-4 py-2 flex justify-between items-center border-b border-white/10">
                <div id="timer" class="text-xl font-mono font-bold">00:00</div>
                <div class="font-black text-sm uppercase tracking-tighter" id="display-topic">TOPIC NAME</div>
                <button onclick="togglePalette()" class="bg-white/20 p-2 rounded-lg">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/></svg>
                </button>
            </div>
            <div class="flex overflow-x-auto no-scrollbar text-[11px] font-bold uppercase">
                <button class="section-tab active px-6 py-3 whitespace-nowrap">Section A</button>
                <button class="section-tab px-6 py-3 whitespace-nowrap opacity-60">Section B</button>
                <button class="section-tab px-6 py-3 whitespace-nowrap opacity-60">Section C</button>
            </div>
        </header>

        <main class="flex-1 flex overflow-hidden relative">
            <div class="flex-1 flex flex-col bg-white dark:bg-[#1a1a1a]">
                <div class="px-4 py-2 border-b dark:border-gray-800 flex justify-between items-center bg-gray-50 dark:bg-gray-900">
                    <span id="q-number-box" class="bg-blue-600 text-white px-4 py-1 rounded-full font-black">1</span>
                    <div class="text-[10px] font-bold text-gray-500 uppercase">Spent: <span id="q-timer" class="text-blue-600">00:00</span></div>
                </div>

                <div id="quiz-container" class="p-6 overflow-y-auto flex-1">
                    <p id="q-text" class="text-lg md:text-xl mb-8 font-bold leading-relaxed"></p>
                    <div id="options-container" class="space-y-4"></div>
                </div>
                
                <div class="p-4 bg-gray-50 dark:bg-gray-900 border-t dark:border-gray-800 grid grid-cols-3 gap-2 no-print">
                    <button onclick="prevQ()" class="bg-gray-200 dark:bg-gray-700 py-3 rounded-xl font-bold text-xs">PREVIOUS</button>
                    <button onclick="markReview()" class="bg-purple-600 text-white py-3 rounded-xl font-bold text-xs">MARK REVIEW</button>
                    <button onclick="saveNext()" class="bg-green-600 text-white py-3 rounded-xl font-black text-xs">SAVE & NEXT</button>
                </div>
            </div>

            <aside id="palette-sidebar" class="fixed right-0 top-0 bottom-0 w-72 bg-white dark:bg-gray-800 shadow-2xl p-6 flex flex-col">
                <h3 class="font-black text-xs text-gray-400 uppercase mb-4">Question Palette</h3>
                <div id="palette-grid" class="grid grid-cols-4 gap-3 overflow-y-auto mb-6"></div>
                <div class="text-[9px] font-bold space-y-1 mb-4 border-t pt-4">
                    <div class="flex items-center gap-2"><span class="w-3 h-3 bg-green-500 rounded"></span> Answered</div>
                    <div class="flex items-center gap-2"><span class="w-3 h-3 bg-red-500 rounded"></span> Not Answered</div>
                    <div class="flex items-center gap-2"><span class="w-3 h-3 bg-purple-500 rounded"></span> Marked for Review</div>
                </div>
                <button onclick="submitQuiz()" class="mt-auto bg-red-600 text-white py-4 rounded-xl font-black uppercase shadow-lg">Final Submit</button>
            </aside>
        </main>
    </div>

    <div id="analysis-view" class="hidden-view p-6 bg-gray-100 dark:bg-[#0f172a] min-h-screen overflow-y-auto">
        </div>

    <script>
        // (Isme Prev, Topic selection aur status update ka sara logic integrated hai)
        let testQs = []; let curIdx = 0; let userAns = []; let timerSec = 0; let clock; let qStartTime;

        // Draggable Toggle Logic
        const dragBox = document.getElementById('theme-toggle');
        let isDragging = false, startX, startY;
        dragBox.addEventListener('pointerdown', e => { isDragging = false; startX = e.clientX; startY = e.clientY; dragBox.setPointerCapture(e.pointerId); });
        dragBox.addEventListener('pointermove', e => { if (Math.abs(e.clientX - startX) > 5 || Math.abs(e.clientY - startY) > 5) { isDragging = true; dragBox.style.left = (e.clientX - 22) + 'px'; dragBox.style.top = (e.clientY - 22) + 'px'; } });
        dragBox.addEventListener('pointerup', () => { if (!isDragging) document.documentElement.classList.toggle('dark'); isDragging = false; });

        function startTest() {
            document.getElementById('display-topic').innerText = document.getElementById('test-topic').value;
            // Question selection logic
            testQs = typeof questionBank !== 'undefined' ? questionBank.sort(() => 0.5 - Math.random()).slice(0, 50) : [];
            userAns = testQs.map(() => ({ selected: null, status: 'unvisited', timeSpent: 0 }));
            timerSec = (parseInt(document.getElementById('custom-time').value) || 60) * 60;
            document.getElementById('setup-screen').classList.add('hidden-view');
            document.getElementById('quiz-area').classList.remove('hidden-view');
            loadQ(0); startTimer();
        }

        function startTimer() {
            clock = setInterval(() => {
                let m = Math.floor(timerSec/60), s = timerSec%60;
                document.getElementById('timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                let qElapsed = Math.floor((Date.now() - qStartTime) / 1000);
                document.getElementById('q-timer').innerText = `${String(Math.floor(qElapsed/60)).padStart(2,'0')}:${String(qElapsed%60).padStart(2,'0')}`;
                if(timerSec-- <= 0) submitQuiz();
            }, 1000);
        }

        function loadQ(idx) {
            if (qStartTime) userAns[curIdx].timeSpent += Math.floor((Date.now() - qStartTime) / 1000);
            curIdx = idx; qStartTime = Date.now();
            const q = testQs[idx], state = userAns[idx];
            document.getElementById('q-number-box').innerText = idx + 1;
            document.getElementById('q-text').innerText = q.q;
            const cont = document.getElementById('options-container'); cont.innerHTML = '';
            q.o.forEach((opt, i) => {
                cont.innerHTML += `<div onclick="pick(${i})" class="p-4 border-2 rounded-xl cursor-pointer flex gap-4 transition-all ${state.selected === i ? 'border-blue-600 bg-blue-50 dark:bg-blue-900/30' : 'border-gray-100 dark:border-gray-700'}">
                    <span class="w-7 h-7 rounded-full border flex items-center justify-center font-bold ${state.selected === i ? 'bg-blue-600 text-white' : 'text-gray-400'}">${i+1}</span>
                    <span class="font-bold">${opt}</span></div>`;
            });
            renderPal();
        }

        function pick(i) { userAns[curIdx].selected = i; loadQ(curIdx); }
        function saveNext() { 
            userAns[curIdx].status = userAns[curIdx].selected !== null ? 'answered' : 'not-answered';
            if(curIdx < testQs.length-1) loadQ(curIdx+1);
        }
        function prevQ() { if(curIdx > 0) loadQ(curIdx-1); }
        function markReview() { userAns[curIdx].status = 'review'; if(curIdx < testQs.length-1) loadQ(curIdx+1); }
        function togglePalette() { document.getElementById('palette-sidebar').classList.toggle('open'); }
        
        function renderPal() {
            const grid = document.getElementById('palette-grid'); grid.innerHTML = '';
            userAns.forEach((s, i) => {
                let cls = 'status-unvisited';
                if(s.status === 'answered') cls = 'status-answered';
                else if(s.status === 'review') cls = 'status-review' + (s.selected !== null ? ' has-ans' : '');
                else if(s.status === 'not-answered') cls = 'status-not-answered';
                grid.innerHTML += `<button onclick="loadQ(${i}); togglePalette()" class="${cls} ${curIdx === i ? 'ring-4 ring-blue-400' : ''}">${i+1}</button>`;
            });
        }

        function submitQuiz() {
            if(confirm("Are you sure to submit?")) location.reload(); // Simple reload for demo
        }
    </script>
</body>
</html>
