<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test Adda Pro - Final Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; }
        .status-unvisited { background-color: #3b82f6; color: white; }
        .status-not-answered { background-color: #ef4444 !important; }
        .status-answered { background-color: #22c55e !important; }
        .status-review { background-color: #8b5cf6 !important; }
        .hidden-view { display: none !important; }
        #palette-sidebar, #saved-panel { transition: transform 0.3s ease-in-out; z-index: 1000; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans">

    <div id="setup-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full border-t-8 border-blue-700">
            <h2 class="text-2xl font-black text-center mb-6 text-blue-800 italic underline">TEST ADDA PRO</h2>
            <div class="space-y-4">
                <input type="text" id="student-name" placeholder="Enter Your Name" class="w-full p-3 rounded-xl border-2 font-bold outline-none border-gray-200">
                <select id="subject-select" onchange="updateTopics()" class="w-full p-3 rounded-xl border-2 font-bold bg-white"><option value="">-- Subject --</option></select>
                <select id="topic-select" onchange="updateMaxQs()" class="w-full p-3 rounded-xl border-2 font-bold bg-white" disabled><option value="">-- Topic --</option></select>
                <div class="bg-blue-50 p-2 rounded-xl">
                    <label class="text-[10px] font-bold text-blue-400 uppercase ml-1">Questions Limit</label>
                    <input type="number" id="q-limit" value="5" class="w-full bg-transparent p-1 font-black text-lg outline-none text-blue-700">
                </div>
                
                <button onclick="startTest()" class="w-full bg-blue-700 text-white py-4 rounded-2xl font-black shadow-lg uppercase">Start Test</button>
                <button onclick="window.startCombinedTest()" class="w-full bg-purple-600 text-white py-3 rounded-xl font-bold text-xs shadow-md uppercase">🔥 Combined Revision (30 Qs)</button>
                
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="window.toggleSavedPanel()" class="bg-yellow-500 text-white py-3 rounded-xl font-bold text-xs shadow-md">⭐ Repository</button>
                    <button onclick="window.startRevision('mistakes')" class="bg-red-600 text-white py-3 rounded-xl font-bold text-xs shadow-md">❌ Mistake Test</button>
                </div>

                <button onclick="window.deepCleanServer()" class="w-full mt-4 bg-black text-white py-2 rounded-xl text-[9px] font-bold uppercase opacity-30 hover:opacity-100 transition">
                    🧹 Deep Clean Server Duplicates
                </button>
            </div>
        </div>
    </div>

    <div id="saved-panel" class="fixed inset-y-0 left-0 w-80 bg-white shadow-2xl transform -translate-x-full z-[2000] flex flex-col">
        <div class="p-4 bg-yellow-500 text-white flex justify-between items-center"><h3 class="font-black italic text-lg">Repository</h3><button onclick="window.toggleSavedPanel()" class="text-2xl">&times;</button></div>
        <div id="saved-list-container" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
        <button onclick="window.startRevision('saved')" class="m-4 bg-blue-700 text-white py-3 rounded-xl font-black uppercase">Start Saved Test (30)</button>
    </div>

    <div id="quiz-area" class="hidden-view h-screen flex flex-col">
        <header class="bg-blue-700 text-white p-4 flex justify-between items-center">
            <div id="timer" class="text-xl font-mono font-bold">00:00</div>
            <div id="display-top" class="text-center font-black text-[10px] uppercase truncate max-w-[150px]"></div>
            <button onclick="togglePalette()" class="bg-white/20 px-3 py-1 rounded-lg font-black text-sm">MENU ☰</button>
        </header>
        <main class="flex-1 flex overflow-hidden relative bg-white">
            <div class="flex-1 flex flex-col">
                <div class="p-4 border-b flex justify-between items-center bg-gray-50">
                    <div class="flex items-center gap-3">
                        <span id="q-number-box" class="bg-blue-600 text-white px-4 py-1 rounded-full font-black text-sm">1</span>
                        <button onclick="window.toggleSave()" id="star-btn" class="text-yellow-500 text-2xl">☆</button>
                    </div>
                    <span id="current-q-timer" class="text-xs font-bold text-blue-500 italic font-mono">Time: 0s</span>
                </div>
                <div id="quiz-container" class="p-6 overflow-y-auto flex-1">
                    <p id="q-text" class="text-lg font-semibold mb-6 leading-relaxed whitespace-pre-line text-gray-800"></p>
                    <div id="options-container" class="space-y-3"></div>
                </div>
                <div class="p-4 bg-gray-50 border-t grid grid-cols-4 gap-2">
                    <button onclick="prevQ()" class="bg-gray-200 py-4 rounded-xl font-black text-[10px] uppercase">Prev</button>
                    <button onclick="clearResponse()" class="bg-yellow-400 py-4 rounded-xl font-black text-[10px] uppercase">Clear</button>
                    <button onclick="markReview()" class="bg-purple-600 text-white py-4 rounded-xl font-black text-[10px] uppercase">Review</button>
                    <button onclick="saveNext()" class="bg-green-600 text-white py-4 rounded-xl font-black text-[10px] uppercase">Next</button>
                </div>
            </div>
            <aside id="palette-sidebar" class="fixed right-0 top-0 bottom-0 w-72 bg-white shadow-2xl p-6 flex flex-col translate-x-full">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-xs text-gray-400 uppercase tracking-widest">Palette</h3>
                    <button onclick="togglePalette()" class="text-xl font-bold bg-red-500 text-white w-8 h-8 rounded-full">×</button>
                </div>
                <div id="palette-grid" class="grid grid-cols-4 gap-2 mb-6 overflow-y-auto"></div>
                <button onclick="submitQuiz()" class="mt-auto bg-red-600 text-white py-4 rounded-xl font-black shadow-lg uppercase">Final Submit</button>
            </aside>
        </main>
    </div>

    <div id="analysis-view" class="hidden-view p-6 bg-gray-50 min-h-screen">
        <div class="max-w-3xl mx-auto">
            <div class="bg-white p-6 rounded-3xl shadow-xl mb-6 text-center border-t-8 border-green-500">
                <h1 class="text-2xl font-black text-blue-700 mb-4 uppercase">Analysis</h1>
                <div class="grid grid-cols-5 gap-2 border-b pb-4">
                    <div><p class="text-[8px] font-bold text-gray-400 uppercase">Correct</p><h3 id="res-correct" class="text-xl font-black text-green-600">0</h3></div>
                    <div>
<p class="text-[8px] font-bold text-gray-400 uppercase">Attempted</p>
<h3 id="res-attempted" class="text-xl font-black text-blue-600">0</h3>
</div>
                    <div><p class="text-[8px] font-bold text-gray-400 uppercase">Wrong</p><h3 id="res-wrong" class="text-xl font-black text-red-600">0</h3></div>
                    <div><p class="text-[8px] font-bold text-gray-400 uppercase">Accuracy</p><h3 id="res-accuracy" class="text-xl font-black text-purple-600">0%</h3></div>
                    <div><p class="text-[8px] font-bold text-gray-400 uppercase">Avg Time</p><h3 id="res-avg-time" class="text-xl font-black text-orange-600">0s</h3></div>
                </div>
                <div id="coach-box" class="mt-4 bg-blue-700 text-white p-4 rounded-2xl flex items-center gap-4">
                    <div class="text-3xl">🎯</div>
                    <div class="text-left"><p id="coach-text" class="text-sm font-bold leading-tight"></p></div>
                </div>
            </div>
            <div id="review-list" class="space-y-4 pb-10"></div>
            <button onclick="location.reload()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase shadow-xl">Back to Menu</button>
        </div>
    </div>

    <script src="./questions.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp, deleteDoc, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCKTKiZVZ3GsiQDPn_8g8_Kc0LNeynK5SY",
            authDomain: "mytestadda-4628a.firebaseapp.com",
            projectId: "mytestadda-4628a",
            storageBucket: "mytestadda-4628a.firebasestorage.app",
            messagingSenderId: "423993478549",
            appId: "1:423993478549:web:614ebefa9b54a75105fa9c"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- Mapper: Fixes undefined 'a' and missing solutions ---
        const mapQ = (docSnap) => {
            const d = docSnap.data();
            return {
                id: docSnap.id,
                q: d.question || d.q || "Text Missing",
                o: d.options || d.o || ["N/A","N/A","N/A","N/A"],
                a: (d.answer !== undefined) ? Number(d.answer) : (d.a !== undefined ? Number(d.a) : 0),
                s: d.subject || d.s || "N/A",
                t: d.topic || d.t || "N/A",
                sol: d.sol || d.solution || "No explanation.",
                mastery: Number(d.mastery || 0)
            };
        };

        window.startRevision = async (type) => {
            const name = document.getElementById('student-name').value;
            if(!name) return alert("Enter Name");
            const coll = type === 'saved' ? "savedQuestions" : "mistakeNotebook";
            const snap = await getDocs(query(collection(db, coll), where("student", "==", name)));
            if(snap.empty) return alert("No questions found!");
            let raw = []; snap.forEach(d => raw.push(mapQ(d)));
            let fresh = raw.filter(q => q.mastery < 3);
            window.testQs = Array.from(new Map(fresh.map(i => [i.q, i])).values()).sort(()=>0.5-Math.random()).slice(0, 30);
            if(window.testQs.length === 0) return alert("Mastery Complete! 🏆");
            document.getElementById('saved-panel').classList.add('-translate-x-full');
            initQuiz(`${type.toUpperCase()} TEST (MAX 30)`);
        };

        window.startCombinedTest = async () => {
            const name = document.getElementById('student-name').value;
            if(!name) return alert("Enter Name");
            const [sSnap, mSnap] = await Promise.all([
                getDocs(query(collection(db,"savedQuestions"), where("student","==",name))),
                getDocs(query(collection(db,"mistakeNotebook"), where("student","==",name)))
            ]);
            let combined = [];
            sSnap.forEach(d => combined.push(mapQ(d)));
            mSnap.forEach(d => combined.push(mapQ(d)));
            let fresh = combined.filter(q => q.mastery < 3);
            window.testQs = Array.from(new Map(fresh.map(i => [i.q, i])).values()).sort(()=>0.5-Math.random()).slice(0, 30);
            if(window.testQs.length === 0) return alert("All Mastered!");
            initQuiz("COMBINED SMART TEST (30)");
        };

        window.toggleSave = async () => {
            const name = document.getElementById("student-name").value;
            if(!name) return alert("Enter Name");
            const q = window.testQs[curIdx];
            const starBtn = document.getElementById("star-btn");
            const qRef = collection(db, "savedQuestions");
            const snap = await getDocs(query(qRef, where("student","==",name), where("question","==",q.q)));
            if(snap.empty) {
                await addDoc(qRef, { student: name, question: q.q, options: q.o, answer: q.a, sol: q.sol, mastery: 0, timestamp: serverTimestamp() });
                starBtn.innerText = "⭐";
            } else { alert("Already Saved"); starBtn.innerText = "⭐"; }
        };

        window.deepCleanServer = async () => {
            const name = document.getElementById('student-name').value;
            if(!name) return alert("Enter Name");
            if(!confirm("Clear duplicate server data?")) return;
            for(let c of ["savedQuestions", "mistakeNotebook"]) {
                const snap = await getDocs(query(collection(db, c), where("student", "==", name)));
                let seen = new Set();
                for(let ds of snap.docs) {
                    let txt = ds.data().question || ds.data().q;
                    if(seen.has(txt)) await deleteDoc(doc(db, c, ds.id));
                    else seen.add(txt);
                }
            }
            alert("Server Cleaned!");
        };

        window.recordMistake = async (name, q) => {
            const qRef = collection(db, "mistakeNotebook");
            const snap = await getDocs(query(qRef, where("student","==",name), where("question","==",q.q)));
            if(snap.empty) await addDoc(qRef, { student: name, question: q.q, options: q.o, answer: q.a, sol: q.sol, mastery: 0, timestamp: serverTimestamp() });
            else await updateDoc(doc(db, "mistakeNotebook", snap.docs[0].id), { mastery: 0 });
        };

        window.updateMastery = async (name, q) => {
            for(let c of ["savedQuestions", "mistakeNotebook"]) {
                const snap = await getDocs(query(collection(db, c), where("student","==",name), where("question","==",q.q)));
                if(!snap.empty) await updateDoc(doc(db, c, snap.docs[0].id), { mastery: increment(1) });
            }
        };

        window.toggleSavedPanel = async () => {
            const panel = document.getElementById('saved-panel');
            panel.classList.toggle('-translate-x-full');
            if(!panel.classList.contains('-translate-x-full')) {
                const name = document.getElementById("student-name").value;
                const container = document.getElementById('saved-list-container');
                container.innerHTML = '<span class="loader mx-auto block mt-10"></span>';
                const snap = await getDocs(query(collection(db, "savedQuestions"), where("student", "==", name)));
                container.innerHTML = snap.empty ? '<p class="text-center mt-10">Empty</p>' : "";
                snap.forEach(doc => { container.innerHTML += `<div class="p-3 border-2 rounded-xl bg-yellow-50 text-xs font-bold">${doc.data().question || doc.data().q}</div>`; });
            }
        };

        window.uploadResult = (data) => addDoc(collection(db, "results"), data);
    </script>

    <script>
        window.onerror = function(message, source, line, col, error){
console.error("App Error:", message, "Line:", line);

alert("⚠️ Something went wrong. Please reload the test.");

return true;
};
        window.testQs = []; let curIdx = 0; let userAns = [];
        let timerSec = 0; let mainClock; let qStartTime; let curInterval;

        window.onload = () => {
            if(typeof questionBank !== 'undefined') {
                [...new Set(questionBank.map(q => q.s))].forEach(s => document.getElementById('subject-select').innerHTML += `<option value="${s}">${s}</option>`);
            }
        };

        function updateTopics() {
            const s = document.getElementById('subject-select').value;
            const tSel = document.getElementById('topic-select');
            tSel.innerHTML = '<option value="">-- Topic --</option>';
            if(s) {
                tSel.disabled = false;
                [...new Set(questionBank.filter(q => q.s === s).map(q => q.t))].forEach(t => tSel.innerHTML += `<option value="${t}">${t}</option>`);
            }
        }

        function updateMaxQs() {
            const sub = document.getElementById('subject-select').value;
            const top = document.getElementById('topic-select').value;
            document.getElementById('q-limit').value = questionBank.filter(q => q.s === sub && q.t === top).length;
        }

        function startTest() {
            const sub = document.getElementById('subject-select').value;
            const top = document.getElementById('topic-select').value;
            const name = document.getElementById('student-name').value;
            const limit = parseInt(document.getElementById('q-limit').value);
            if(!sub || !top || !name) return alert("Fill all details");
            window.testQs = questionBank.filter(q => q.s === sub && q.t === top).sort(() => 0.5 - Math.random()).slice(0, limit);
            initQuiz(`${sub} > ${top}`);
        }

        function initQuiz(title) {
            userAns = window.testQs.map(() => ({ selected: null, status: 'unvisited', timeSpent: 0 }));
            timerSec = window.testQs.length * 60;
            document.getElementById('display-top').innerText = title;
            document.getElementById('setup-screen').classList.add('hidden-view');
            document.getElementById('quiz-area').classList.remove('hidden-view');
            loadQ(0);
            mainClock = setInterval(() => {
                let m = Math.floor(timerSec/60), s = timerSec%60;
                document.getElementById('timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                if(timerSec-- <= 0) submitQuiz();
            }, 1000);
        }

        function loadQ(idx) {
            if(qStartTime) userAns[curIdx].timeSpent += Math.floor((Date.now() - qStartTime)/1000);
            curIdx = idx; qStartTime = Date.now();
            const q = window.testQs[idx];
            document.getElementById('q-number-box').innerText = idx + 1;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('star-btn').innerText = "☆";
            const optCont = document.getElementById('options-container');
            optCont.innerHTML = '';
            q.o.forEach((opt, i) => {
                const isSel = userAns[idx].selected === i;
                optCont.innerHTML += `<div onclick="pick(${i})" class="p-4 border-2 rounded-2xl cursor-pointer flex items-center gap-4 transition ${isSel ? 'border-blue-600 bg-blue-50' : 'border-gray-100 bg-white shadow-sm'}"><span class="w-8 h-8 rounded-full border flex items-center justify-center font-bold ${isSel ? 'bg-blue-600 text-white' : 'bg-gray-100'}">${i+1}</span><span class="font-medium text-gray-700">${opt}</span></div>`;
            });
            clearInterval(curInterval);
            let s = userAns[curIdx].timeSpent;
            curInterval = setInterval(() => { s++; document.getElementById('current-q-timer').innerText = `Time: ${s}s`; }, 1000);
        }

        function pick(i) { userAns[curIdx].selected = i; loadQ(curIdx); }
        function saveNext() { userAns[curIdx].status = (userAns[curIdx].selected !== null) ? 'answered' : 'not-answered'; (curIdx < window.testQs.length - 1) ? loadQ(curIdx + 1) : togglePalette(); }
        function prevQ() { if(curIdx > 0) loadQ(curIdx - 1); }
        function clearResponse() { userAns[curIdx].selected = null; loadQ(curIdx); }
        function markReview() { userAns[curIdx].status = 'review'; (curIdx < window.testQs.length - 1) ? loadQ(curIdx + 1) : togglePalette(); }
        function togglePalette() { renderPalette(); document.getElementById('palette-sidebar').classList.toggle('translate-x-full'); }

        function renderPalette() {
            const grid = document.getElementById('palette-grid'); grid.innerHTML = '';
            userAns.forEach((u, i) => {
                let cls = u.status === 'answered' ? 'status-answered' : (u.status === 'review' ? 'status-review' : (u.status === 'not-answered' ? 'status-not-answered' : 'status-unvisited'));
                grid.innerHTML += `<button onclick="loadQ(${i}); togglePalette()" class="p-3 text-white font-black rounded-xl ${cls}">${i+1}</button>`;
            });
        }

        async function submitQuiz() {
            if(!confirm("Submit Test?")) return;
            clearInterval(mainClock); clearInterval(curInterval);
            if(qStartTime) userAns[curIdx].timeSpent += Math.floor((Date.now() - qStartTime)/1000);
            
            let correct = 0, attempted = 0, totalT = 0;
            const name = document.getElementById('student-name').value;
            const reviewDiv = document.getElementById('review-list');
            reviewDiv.innerHTML = '';

            for (let i = 0; i < window.testQs.length; i++) {
                const q = window.testQs[i];
                const u = userAns[i];
                const isCorrect = (u.selected !== null) && (Number(u.selected) === Number(q.a));
                totalT += u.timeSpent;

                if(u.selected !== null) {
                    attempted++;
                    if(isCorrect) { correct++; await window.updateMastery(name, q); } 
                    else { await window.recordMistake(name, q); }
                }

                reviewDiv.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border-l-8 ${isCorrect ? 'border-green-500' : (u.selected===null?'border-gray-300':'border-red-500')}">
                        <div class="flex justify-between items-start mb-2">
                            <p class="font-bold text-gray-800 flex-1">${q.q}</p>
                            <span class="text-[10px] font-black bg-gray-100 px-2 py-1 rounded text-gray-500 ml-2 whitespace-nowrap">⏱ ${u.timeSpent}s</span>
                        </div>
                        <div class="text-xs space-y-1">
                            <p class="text-green-600 font-bold">✔ Correct: ${q.o[q.a]}</p>
                            ${!isCorrect && u.selected !== null ? `<p class="text-red-500 font-bold">✖ Yours: ${q.o[u.selected]}</p>` : ''}
                            ${q.sol ? `<div class="mt-4 p-4 bg-blue-50 border-l-4 border-blue-400 rounded-r-2xl"><p class="text-[9px] font-black text-blue-500 uppercase mb-1">Explanation:</p><p class="text-gray-700 text-sm italic">${q.sol}</p></div>` : ''}
                        </div>
                    </div>`;
            }

            document.getElementById('res-correct').innerText = correct;
            document.getElementById('res-attempted').innerText = attempted;
            document.getElementById('res-wrong').innerText = attempted - correct;
            document.getElementById('res-accuracy').innerText = attempted ? Math.round((correct/attempted)*100) + "%" : "0%";
            document.getElementById('res-avg-time').innerText = Math.round(totalT/window.testQs.length) + "s";
            document.getElementById('coach-text').innerText = correct/window.testQs.length > 0.7 ? "Great mastery! Keep it up." : "Review solutions carefully.";
            
            document.getElementById('quiz-area').classList.add('hidden-view');
            document.getElementById('analysis-view').classList.remove('hidden-view');
            window.uploadResult({ student: name, score: correct, total: window.testQs.length, date: new Date().toISOString() });
        }
    </script>
</body>
</html>
