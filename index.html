<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Portal Pro - Deep Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        .status-unvisited { background-color: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
        .status-not-answered { background-color: #ef4444 !important; color: white !important; }
        .status-answered { background-color: #22c55e !important; color: white !important; }
        .status-review { background-color: #8b5cf6 !important; color: white !important; position: relative; }
        .status-review.has-ans::after { content: ''; position: absolute; top: 2px; right: 2px; width: 8px; height: 8px; background: #22c55e; border-radius: 50%; border: 1px solid white; }
        #palette-sidebar { transition: 0.4s ease; transform: translateX(100%); z-index: 100; }
        #palette-sidebar.open { transform: translateX(0); }
        .hidden-view { display: none !important; }
        .stat-card { transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 font-sans transition-colors duration-300">

    <script src="./questions.js"></script>

    <div id="setup-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-2xl max-w-lg w-full border-t-8 border-blue-700">
            <h1 class="text-3xl font-black text-center mb-8 text-blue-900 dark:text-blue-400">EXAM SETUP</h1>
            <div class="space-y-5">
                <input type="text" id="student-id" placeholder="Enter Student Name/ID" class="w-full p-4 border-2 rounded-xl dark:bg-gray-700 dark:text-white font-bold outline-blue-500">
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">Subject</label>
                        <select id="select-subject" class="w-full p-3 border-2 rounded-lg dark:bg-gray-700 dark:text-white font-semibold"></select>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">Negative Marking</label>
                        <select id="neg-mark" class="w-full p-3 border-2 rounded-lg dark:bg-gray-700 dark:text-white font-bold">
                            <option value="0">None</option>
                            <option value="0.25">0.25 (1/4)</option>
                            <option value="0.33">0.33 (1/3)</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">No. of Qs</label>
                        <input type="number" id="q-count" value="10" class="w-full p-3 border-2 rounded-lg dark:bg-gray-700 dark:text-white">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">Time (Min)</label>
                        <input type="number" id="custom-time" value="20" class="w-full p-3 border-2 rounded-lg dark:bg-gray-700 dark:text-white">
                    </div>
                </div>

                <button onclick="startTest()" class="w-full bg-blue-700 hover:bg-blue-800 text-white py-4 rounded-2xl font-black text-xl shadow-xl transition-all">START EXAMINATION</button>
            </div>
        </div>
    </div>

    <div id="quiz-area" class="hidden-view">
        <header class="bg-blue-900 text-white px-6 py-4 flex justify-between items-center fixed top-0 w-full z-50 shadow-2xl">
            <div class="flex flex-col">
                <span id="display-id" class="text-[10px] font-bold opacity-70">STUDENT: RK-9113</span>
                <h1 class="font-black text-sm tracking-widest uppercase">TEST ADDA LIVE</h1>
            </div>
            <div class="flex items-center gap-4">
                <div id="timer" class="bg-black/30 px-5 py-1 rounded-full font-mono text-2xl border border-white/20">00:00</div>
                <button onclick="togglePalette()" class="bg-white text-blue-900 px-4 py-1 rounded-lg font-black text-xs">PALETTE</button>
            </div>
        </header>

        <main class="pt-20 flex h-screen overflow-hidden">
            <div class="flex-1 flex flex-col bg-white dark:bg-gray-800">
                <div id="quiz-container" class="p-6 md:p-12 overflow-y-auto flex-1">
                    <div class="flex justify-between items-center mb-6 border-b pb-4 dark:border-gray-700">
                        <h2 id="q-number" class="text-2xl font-black text-blue-700">Q1</h2>
                        <div class="flex gap-2">
                            <span id="q-meta" class="text-[10px] font-bold bg-gray-100 dark:bg-gray-700 px-3 py-1 rounded-full uppercase"></span>
                        </div>
                    </div>
                    <p id="q-text" class="text-xl md:text-2xl font-semibold mb-10 dark:text-white leading-relaxed"></p>
                    <div id="options-container" class="grid grid-cols-1 gap-4 mb-8"></div>
                    <button onclick="clearResponse()" class="text-xs font-bold text-gray-400 hover:text-red-500 uppercase tracking-widest transition-colors underline">Clear Selection</button>
                </div>
                
                <div class="p-6 bg-gray-50 dark:bg-gray-900 border-t dark:border-gray-700 flex justify-between items-center">
                    <button onclick="markReview()" class="bg-purple-100 text-purple-700 px-6 py-3 rounded-xl font-bold hover:bg-purple-200">Review Later</button>
                    <div class="flex gap-3">
                        <button onclick="prevQ()" class="bg-gray-200 dark:bg-gray-700 dark:text-white px-6 py-3 rounded-xl font-bold">PREV</button>
                        <button onclick="saveNext()" class="bg-green-600 text-white px-10 py-3 rounded-xl font-black shadow-lg hover:bg-green-700">SAVE & NEXT</button>
                    </div>
                </div>
            </div>

            <aside id="palette-sidebar" class="fixed right-0 top-0 bottom-0 w-80 bg-white dark:bg-gray-800 shadow-[-10px_0_30px_rgba(0,0,0,0.1)] p-8 flex flex-col">
                <h3 class="font-black text-gray-400 uppercase text-xs mb-8 tracking-widest">Question Palette</h3>
                <div id="palette-grid" class="grid grid-cols-4 gap-4 overflow-y-auto"></div>
                <button onclick="submitQuiz()" class="mt-auto bg-red-600 text-white py-5 rounded-2xl font-black shadow-xl hover:bg-red-700 uppercase tracking-tighter">Finish & Submit</button>
            </aside>
        </main>
    </div>

    <div id="analysis-view" class="hidden-view p-6 bg-gray-50 dark:bg-gray-900 min-h-screen overflow-y-auto">
        <div class="max-w-5xl mx-auto pt-10 pb-20">
            <div class="flex flex-col md:flex-row justify-between items-end mb-10 gap-4">
                <div>
                    <h2 class="text-4xl font-black text-blue-900 dark:text-blue-400">DEEP ANALYSIS</h2>
                    <p class="text-gray-500 font-bold uppercase text-xs mt-1" id="analysis-student-id"></p>
                </div>
                <button onclick="location.reload()" class="bg-blue-700 text-white px-8 py-3 rounded-2xl font-black shadow-lg">RE-TAKE TEST</button>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                <div class="bg-white dark:bg-gray-800 p-6 rounded-3xl shadow-sm border-b-4 border-blue-500 stat-card">
                    <p class="text-xs font-bold text-gray-400 uppercase">Final Score</p>
                    <h3 id="stat-score" class="text-3xl font-black text-blue-700">0.00</h3>
                </div>
                <div class="bg-white dark:bg-gray-800 p-6 rounded-3xl shadow-sm border-b-4 border-green-500 stat-card">
                    <p class="text-xs font-bold text-gray-400 uppercase">Accuracy</p>
                    <h3 id="stat-accuracy" class="text-3xl font-black text-green-600">0%</h3>
                </div>
                <div class="bg-white dark:bg-gray-800 p-6 rounded-3xl shadow-sm border-b-4 border-red-500 stat-card">
                    <p class="text-xs font-bold text-gray-400 uppercase">Time Used</p>
                    <h3 id="stat-time" class="text-3xl font-black text-gray-700 dark:text-white">0m</h3>
                </div>
                <div class="bg-white dark:bg-gray-800 p-6 rounded-3xl shadow-sm border-b-4 border-purple-500 stat-card">
                    <p class="text-xs font-bold text-gray-400 uppercase">Correct/Total</p>
                    <h3 id="stat-ratio" class="text-3xl font-black text-purple-600">0/0</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-6" id="review-list"></div>
                
                <div class="lg:col-span-1">
                    <div class="bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-xl sticky top-10">
                        <h3 class="font-black text-lg mb-6 border-b pb-2 dark:border-gray-700">TOPIC ANALYSIS</h3>
                        <div id="topic-stats" class="space-y-4 text-sm font-bold"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let testQs = []; let curIdx = 0; let userAns = []; let timerSec = 0; let clock;
        let qStartTime; let totalUsedTime = 0;

        function initSetup() {
            if (typeof questionBank === 'undefined') return;
            const subSel = document.getElementById('select-subject');
            const subs = [...new Set(questionBank.map(q => q.sub))];
            subSel.innerHTML = '<option value="all">All Subjects</option>';
            subs.forEach(s => subSel.innerHTML += `<option value="${s}">${s}</option>`);
        }

        function startTest() {
            const mins = parseInt(document.getElementById('custom-time').value) || 20;
            timerSec = mins * 60;
            const sub = document.getElementById('select-subject').value;
            const count = parseInt(document.getElementById('q-count').value) || 10;
            const sId = document.getElementById('student-id').value || "Guest User";

            testQs = questionBank.filter(q => (sub === 'all' || q.sub === sub))
                     .sort(() => 0.5 - Math.random()).slice(0, count);
            
            userAns = testQs.map(() => ({ selected: null, status: 'unvisited', timeSpent: 0 }));
            document.getElementById('display-id').innerText = `STUDENT: ${sId}`;
            document.getElementById('setup-screen').classList.add('hidden-view');
            document.getElementById('quiz-area').classList.remove('hidden-view');
            loadQ(0); startTimer();
        }

        function startTimer() {
            clock = setInterval(() => {
                let m = Math.floor(timerSec/60); let s = timerSec%60;
                document.getElementById('timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                if(timerSec-- <= 0) submitQuiz();
            }, 1000);
        }

        function loadQ(idx) {
            if (qStartTime) userAns[curIdx].timeSpent += Math.floor((Date.now() - qStartTime) / 1000);
            curIdx = idx; qStartTime = Date.now();
            const q = testQs[idx]; const state = userAns[idx];
            if(state.status === 'unvisited') state.status = 'visited';
            
            document.getElementById('q-number').innerText = `Q${idx + 1}`;
            document.getElementById('q-meta').innerText = `${q.sub} | ${q.topic}`;
            document.getElementById('q-text').innerText = q.q;
            
            const cont = document.getElementById('options-container'); cont.innerHTML = '';
            q.o.forEach((opt, i) => {
                const sel = state.selected === i;
                cont.innerHTML += `<div onclick="pick(${i})" class="p-5 border-2 rounded-2xl cursor-pointer flex items-center transition-all ${sel ? 'border-blue-600 bg-blue-50 dark:bg-blue-900/40' : 'border-gray-100 dark:border-gray-700 hover:bg-gray-50'}">
                    <span class="w-8 h-8 rounded-full border-2 mr-4 flex items-center justify-center font-bold ${sel ? 'bg-blue-600 border-blue-600 text-white' : 'text-gray-400'}">${String.fromCharCode(65+i)}</span>
                    <span class="font-bold dark:text-gray-200 text-lg">${opt}</span></div>`;
            });
            renderPal();
        }

        function pick(i) { userAns[curIdx].selected = i; loadQ(curIdx); }
        function clearResponse() { userAns[curIdx].selected = null; userAns[curIdx].status = 'visited'; loadQ(curIdx); }
        function saveNext() { 
            userAns[curIdx].status = userAns[curIdx].selected !== null ? 'answered' : 'not-answered';
            if(curIdx < testQs.length-1) loadQ(curIdx+1); else renderPal(); 
        }
        function prevQ() { if(curIdx > 0) loadQ(curIdx-1); }
        function markReview() { userAns[curIdx].status = 'review'; if(curIdx < testQs.length-1) loadQ(curIdx+1); else renderPal(); }
        function togglePalette() { document.getElementById('palette-sidebar').classList.toggle('open'); }
        
        function renderPal() {
            const grid = document.getElementById('palette-grid'); grid.innerHTML = '';
            userAns.forEach((s, i) => {
                let cls = 'status-unvisited';
                if(s.status === 'answered') cls = 'status-answered';
                else if(s.status === 'review') cls = 'status-review' + (s.selected !== null ? ' has-ans' : '');
                else if(s.status === 'not-answered' || s.status === 'visited') cls = 'status-not-answered';
                grid.innerHTML += `<button onclick="loadQ(${i})" class="w-12 h-12 rounded-xl font-black text-sm ${cls} ${curIdx === i ? 'ring-4 ring-blue-300 scale-110' : ''}">${i+1}</button>`;
            });
        }

        function submitQuiz() {
            if(!confirm("Are you sure you want to finish the exam?")) return;
            userAns[curIdx].timeSpent += Math.floor((Date.now() - qStartTime) / 1000);
            clearInterval(clock);
            
            document.getElementById('quiz-area').classList.add('hidden-view');
            document.getElementById('analysis-view').classList.remove('hidden-view');
            
            // Stats Calculation
            let correct = 0, wrong = 0, totalTime = 0;
            const negValue = parseFloat(document.getElementById('neg-mark').value);
            const topicMap = {};

            userAns.forEach((s, i) => {
                const q = testQs[i];
                totalTime += s.timeSpent;
                if(!topicMap[q.topic]) topicMap[q.topic] = { c: 0, t: 0, time: 0 };
                topicMap[q.topic].t++;
                topicMap[q.topic].time += s.timeSpent;

                if(s.selected !== null) {
                    if(s.selected === q.a) { correct++; topicMap[q.topic].c++; }
                    else wrong++;
                }
            });

            const finalScore = (correct * 1) - (wrong * negValue);
            const accuracy = Math.round((correct / (correct + wrong)) * 100) || 0;

            // UI Update
            document.getElementById('stat-score').innerText = finalScore.toFixed(2);
            document.getElementById('stat-accuracy').innerText = accuracy + "%";
            document.getElementById('stat-time').innerText = Math.floor(totalTime/60) + "m " + (totalTime%60) + "s";
            document.getElementById('stat-ratio').innerText = `${correct}/${testQs.length}`;
            document.getElementById('analysis-student-id').innerText = document.getElementById('display-id').innerText;

            // Topic Stats UI
            const topDiv = document.getElementById('topic-stats'); topDiv.innerHTML = '';
            for(let key in topicMap) {
                topDiv.innerHTML += `<div class="p-4 bg-gray-50 dark:bg-gray-700/30 rounded-2xl">
                    <p class="uppercase text-blue-600 mb-1">${key}</p>
                    <div class="flex justify-between">
                        <span>Score: ${topicMap[key].c}/${topicMap[key].t}</span>
                        <span class="text-gray-400">⏱ ${topicMap[key].time}s</span>
                    </div>
                </div>`;
            }

            // Detailed Review List
            const rList = document.getElementById('review-list'); rList.innerHTML = '';
            userAns.forEach((s, i) => {
                const isC = s.selected === testQs[i].a;
                rList.innerHTML += `<div class="p-8 bg-white dark:bg-gray-800 rounded-3xl shadow-sm border-l-8 ${s.selected === null ? 'border-gray-300' : (isC ? 'border-green-500' : 'border-red-500')}">
                    <div class="flex justify-between items-start mb-4">
                        <p class="font-bold text-lg dark:text-white">Q${i+1}: ${testQs[i].q}</p>
                        <span class="text-xs font-mono bg-gray-100 dark:bg-gray-700 px-2 py-1 rounded">⏱ ${s.timeSpent}s</span>
                    </div>
                    <div class="space-y-2 mb-6 text-sm">
                        <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-blue-500"></span> Correct: <span class="text-green-600">${testQs[i].o[testQs[i].a]}</span></div>
                        <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-gray-400"></span> Yours: <span class="${isC ? 'text-green-600' : 'text-red-600'}">${s.selected !== null ? testQs[i].o[s.selected] : 'Skipped'}</span></div>
                    </div>
                    <div class="p-5 bg-blue-50 dark:bg-gray-900/50 rounded-2xl text-sm italic dark:text-gray-300 border border-blue-100 dark:border-blue-900/30 whitespace-pre-wrap leading-relaxed">${testQs[i].sol}</div>
                </div>`;
            });
        }
        window.onload = initSetup;
    </script>
</body>
</html>
