<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Adda - Live Firebase Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-unvisited { background-color: #3b82f6; color: white; }
        .status-not-answered { background-color: #ef4444 !important; }
        .status-answered { background-color: #22c55e !important; }
        .status-review { background-color: #8b5cf6 !important; position: relative; }
        .hidden-view { display: none !important; }
        #palette-sidebar { transition: 0.4s ease; transform: translateX(100%); z-index: 1000; }
        #palette-sidebar.open { transform: translateX(0); }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans overflow-hidden">

    <div id="setup-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full border-t-8 border-blue-700">
            <h2 class="text-2xl font-black text-center mb-6 text-blue-800">TEST ADDA LIVE</h2>
            <div class="space-y-4">
                <input type="text" id="student-name" placeholder="Enter Your Name" class="w-full p-3 rounded-xl border-2 font-bold outline-none border-gray-200">
                
                <select id="subject-select" onchange="updateTopics()" class="w-full p-3 rounded-xl border-2 font-bold bg-white">
                    <option value="">-- Select Subject --</option>
                </select>

                <select id="topic-select" onchange="updateMaxQs()" class="w-full p-3 rounded-xl border-2 font-bold bg-white" disabled>
                    <option value="">-- Select Topic --</option>
                </select>

                <div>
                    <label class="text-[10px] font-bold text-gray-400 ml-1">QUESTIONS LIMIT</label>
                    <input type="number" id="q-limit" value="5" min="1" class="w-full p-3 rounded-xl border-2 font-bold">
                    <p id="max-q-msg" class="text-[9px] text-blue-500 mt-1"></p>
                </div>

                <button onclick="startTest()" class="w-full bg-blue-700 text-white py-4 rounded-2xl font-black shadow-lg">START TEST</button>
            </div>
        </div>
    </div>

    <div id="quiz-area" class="hidden-view h-screen flex flex-col">
        <header class="bg-blue-700 text-white p-4 flex justify-between items-center shadow-md">
            <div id="timer" class="text-xl font-mono font-bold">00:00</div>
            <div class="text-center font-black text-xs uppercase"><span id="display-top"></span></div>
            <button onclick="togglePalette()" class="bg-white/20 p-2 rounded-lg">☰</button>
        </header>

        <main class="flex-1 flex overflow-hidden relative">
            <div class="flex-1 flex flex-col bg-white">
                <div class="p-4 border-b flex justify-between items-center bg-gray-50">
                    <span id="q-number-box" class="bg-blue-600 text-white px-4 py-1 rounded-full font-black text-sm">1</span>
                    <span id="current-q-timer" class="text-xs font-bold text-blue-500 italic">Time: 0s</span>
                </div>
                <div id="quiz-container" class="p-6 overflow-y-auto flex-1">
                    <p id="q-text" class="text-lg font-bold mb-6 leading-relaxed"></p>
                    <div id="options-container" class="space-y-3"></div>
                </div>
                <div class="p-4 bg-gray-50 border-t grid grid-cols-3 gap-3">
                    <button onclick="prevQ()" class="bg-gray-200 py-3 rounded-xl font-bold text-xs">PREV</button>
                    <button onclick="markReview()" class="bg-purple-600 text-white py-3 rounded-xl font-bold text-xs">REVIEW</button>
                    <button onclick="saveNext()" class="bg-green-600 text-white py-3 rounded-xl font-black text-xs">SAVE & NEXT</button>
                </div>
            </div>
            <aside id="palette-sidebar" class="fixed right-0 top-0 bottom-0 w-64 bg-white shadow-2xl p-6 flex flex-col">
                <h3 class="font-black text-xs text-gray-400 mb-4">PALETTE</h3>
                <div id="palette-grid" class="grid grid-cols-4 gap-2 mb-6"></div>
                <button onclick="submitQuiz()" class="mt-auto bg-red-600 text-white py-4 rounded-xl font-black">SUBMIT</button>
            </aside>
        </main>
    </div>

    <div id="analysis-view" class="hidden-view p-6 bg-gray-50 min-h-screen overflow-y-auto">
        <div class="max-w-3xl mx-auto">
            <div class="bg-white p-6 rounded-3xl shadow-xl mb-6 text-center border-t-8 border-green-500">
                <h1 class="text-2xl font-black text-blue-700 mb-2 uppercase">Analysis Report</h1>
                <p id="res-name" class="font-bold text-gray-500 mb-4"></p>
                <div class="flex justify-around border-t pt-4">
                    <div><p class="text-[10px] font-bold text-gray-400">CORRECT</p><h3 id="res-correct" class="text-xl font-black text-green-600">0</h3></div>
                    <div><p class="text-[10px] font-bold text-gray-400">WRONG</p><h3 id="res-wrong" class="text-xl font-black text-red-600">0</h3></div>
                    <div><p class="text-[10px] font-bold text-gray-400">AVG TIME</p><h3 id="res-avg-time" class="text-xl font-black text-blue-600">0s</h3></div>
                </div>
                <p class="text-xs text-orange-500 mt-4 font-bold italic">Result saved to Cloud Database!</p>
            </div>
            <div id="review-list" class="space-y-4 pb-10"></div>
            <button onclick="location.reload()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black">BACK TO HOME</button>
        </div>
    </div>

    <script src="./questions.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCKTKiZVZ3GsiQDPn_8g8_Kc0LNeynK5SY",
            authDomain: "mytestadda-4628a.firebaseapp.com",
            projectId: "mytestadda-4628a",
            storageBucket: "mytestadda-4628a.firebasestorage.app",
            messagingSenderId: "423993478549",
            appId: "1:423993478549:web:614ebefa9b54a75105fa9c",
            measurementId: "G-JBE28ES8BL"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Function to upload result to Firebase
        window.uploadToFirebase = async (data) => {
            try {
                await addDoc(collection(db, "results"), data);
                console.log("Uploaded successfully!");
            } catch (err) {
                console.error("Firebase Error:", err);
            }
        };
    </script>

    <script>
        let testQs = []; let curIdx = 0; let userAns = []; let timerSec = 0;
        let mainClock; let qStartTimestamp;

        window.onload = function() {
            if(typeof questionBank === 'undefined') return alert("questions.js not found!");
            const subjects = [...new Set(questionBank.map(q => q.s))];
            subjects.forEach(s => document.getElementById('subject-select').innerHTML += `<option value="${s}">${s}</option>`);
        };

        function updateTopics() {
            const sub = document.getElementById('subject-select').value;
            const topSelect = document.getElementById('topic-select');
            topSelect.innerHTML = '<option value="">-- Choose Topic --</option>';
            if(sub) {
                topSelect.disabled = false;
                const topics = [...new Set(questionBank.filter(q => q.s === sub).map(q => q.t))];
                topics.forEach(t => topSelect.innerHTML += `<option value="${t}">${t}</option>`);
            }
        }

        function updateMaxQs() {
            const sub = document.getElementById('subject-select').value;
            const top = document.getElementById('topic-select').value;
            const available = questionBank.filter(q => q.s === sub && q.t === top).length;
            document.getElementById('q-limit').value = available;
            document.getElementById('max-q-msg').innerText = `Available: ${available} questions`;
        }

        function startTest() {
            const sub = document.getElementById('subject-select').value;
            const top = document.getElementById('topic-select').value;
            const limit = parseInt(document.getElementById('q-limit').value);
            const name = document.getElementById('student-name').value;
            
            if(!name) return alert("Please enter your name!");
            if(!sub || !top) return alert("Select Subject & Topic!");

            let filtered = questionBank.filter(q => q.s === sub && q.t === top);
            testQs = filtered.sort(() => 0.5 - Math.random()).slice(0, limit);
            
            userAns = testQs.map(() => ({ selected: null, status: 'unvisited', timeSpent: 0 }));
            timerSec = testQs.length * 60;

            document.getElementById('display-top').innerText = top;
            document.getElementById('setup-screen').classList.add('hidden-view');
            document.getElementById('quiz-area').classList.remove('hidden-view');
            
            loadQ(0);
            mainClock = setInterval(() => {
                let m = Math.floor(timerSec/60), s = timerSec%60;
                document.getElementById('timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                if(timerSec-- <= 0) submitQuiz();
            }, 1000);
        }

        function loadQ(idx) {
            if(qStartTimestamp) {
                userAns[curIdx].timeSpent += Math.floor((Date.now() - qStartTimestamp) / 1000);
            }
            curIdx = idx;
            qStartTimestamp = Date.now();
            const q = testQs[idx];
            document.getElementById('q-number-box').innerText = idx + 1;
            document.getElementById('q-text').innerText = q.q;
            
            const cont = document.getElementById('options-container'); 
            cont.innerHTML = '';
            q.o.forEach((opt, i) => {
                const sel = userAns[idx].selected === i;
                cont.innerHTML += `<div onclick="pick(${i})" class="p-4 border-2 rounded-xl cursor-pointer flex gap-3 ${sel ? 'border-blue-600 bg-blue-50' : 'border-gray-100'}">
                    <span class="w-6 h-6 rounded-full border flex items-center justify-center text-xs font-bold ${sel ? 'bg-blue-600 text-white' : ''}">${i+1}</span>
                    <span class="font-bold">${opt}</span></div>`;
            });
            renderPal();
        }

        function pick(i) { userAns[curIdx].selected = i; loadQ(curIdx); }
        function saveNext() { 
            userAns[curIdx].status = userAns[curIdx].selected !== null ? 'answered' : 'not-answered';
            if(curIdx < testQs.length - 1) loadQ(curIdx + 1); else togglePalette();
        }
        function prevQ() { if(curIdx > 0) loadQ(curIdx - 1); }
        function markReview() { userAns[curIdx].status = 'review'; if(curIdx < testQs.length - 1) loadQ(curIdx + 1); }
        function togglePalette() { document.getElementById('palette-sidebar').classList.toggle('open'); }
        function renderPal() {
            const grid = document.getElementById('palette-grid'); grid.innerHTML = '';
            userAns.forEach((s, i) => {
                let cls = 'status-unvisited';
                if(s.status === 'answered') cls = 'status-answered';
                else if(s.status === 'review') cls = 'status-review';
                else if(s.status === 'not-answered') cls = 'status-not-answered';
                grid.innerHTML += `<button onclick="loadQ(${i}); togglePalette()" class="p-2 text-white font-bold rounded ${cls} ${curIdx === i ? 'ring-4 ring-yellow-400' : ''}">${i+1}</button>`;
            });
        }

        async function submitQuiz() {
            if(!confirm("Submit Test?")) return;
            userAns[curIdx].timeSpent += Math.floor((Date.now() - qStartTimestamp) / 1000);
            clearInterval(mainClock);

            document.getElementById('quiz-area').classList.add('hidden-view');
            document.getElementById('analysis-view').classList.remove('hidden-view');

            let correct = 0, wrong = 0, totalTime = 0;
            const rList = document.getElementById('review-list');
            rList.innerHTML = '<h3 class="font-black mb-4">Question Analysis</h3>';

            userAns.forEach((ans, i) => {
                const q = testQs[i];
                const isCorrect = ans.selected === q.a;
                if(ans.selected !== null) isCorrect ? correct++ : wrong++;
                totalTime += ans.timeSpent;

                rList.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl shadow-sm mb-4 border-l-8 ${isCorrect?'border-green-500':'border-red-500'}">
                        <div class="flex justify-between text-[10px] font-bold text-blue-500 mb-2">
                            <span>Q. ${i+1}</span> <span>TIME: ${ans.timeSpent}s</span>
                        </div>
                        <p class="font-bold mb-3">${q.q}</p>
                        <p class="text-sm"><b>Correct Ans:</b> ${q.o[q.a]}</p>
                        <div class="mt-2 text-[10px] bg-gray-50 p-2 rounded"><b>Sol:</b> ${q.sol || 'No solution available'}</div>
                    </div>`;
            });

            const finalScore = correct - (wrong * 0.25);
            document.getElementById('res-correct').innerText = correct;
            document.getElementById('res-wrong').innerText = wrong;
            document.getElementById('res-avg-time').innerText = Math.round(totalTime/testQs.length) + "s";
            document.getElementById('res-name').innerText = document.getElementById('student-name').value;

            // --- FIREBASE DATA UPLOAD ---
            const firebaseData = {
                student: document.getElementById('student-name').value,
                subject: document.getElementById('subject-select').value,
                topic: document.getElementById('topic-select').value,
                score: finalScore,
                correct: correct,
                wrong: wrong,
                avgTime: Math.round(totalTime/testQs.length),
                date: new Date().toISOString()
            };
            
            if(window.uploadToFirebase) {
                window.uploadToFirebase(firebaseData);
            }
        }
    </script>
</body>
</html>
