<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Portal Pro - Final Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        /* Palette Shape Fix */
        #palette-grid button {
            aspect-ratio: 1 / 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-weight: 800;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        /* Official Colors */
        .status-unvisited { background-color: #3b82f6; color: white; border: none; }
        .status-not-answered { background-color: #ef4444 !important; color: white !important; }
        .status-answered { background-color: #22c55e !important; color: white !important; }
        .status-review { background-color: #8b5cf6 !important; color: white !important; position: relative; }
        .status-review.has-ans::after { 
            content: ''; position: absolute; top: 3px; right: 3px; width: 6px; height: 6px; 
            background: #22c55e; border-radius: 50%; border: 1px solid white; 
        }

        /* Draggable Toggle */
        #theme-toggle {
            touch-action: none;
            user-select: none;
            cursor: move;
            width: 50px;
            height: 50px;
        }

        /* UI Adjustments */
        #palette-sidebar { transition: 0.4s ease; transform: translateX(100%); z-index: 1000; }
        #palette-sidebar.open { transform: translateX(0); }
        .hidden-view { display: none !important; }
        #q-text { word-break: break-word; line-height: 1.6; font-weight: 600; color: #1e293b; }
        .dark #q-text { color: #f1f5f9 !important; }
        
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-gray-100 dark:bg-[#121212] text-gray-900 dark:text-gray-100 font-sans transition-colors duration-300 overflow-hidden">

    <script src="./questions.js"></script>

    <div id="theme-toggle" class="fixed top-24 left-4 z-[2000] bg-blue-600 text-white rounded-full shadow-2xl flex items-center justify-center no-print">
        <span id="theme-icon" class="text-xl">🌙</span>
    </div>

    <div id="setup-screen" class="min-h-screen flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-2xl max-w-md w-full border-t-8 border-blue-700">
            <h1 class="text-2xl font-black text-center mb-6 text-blue-800 dark:text-blue-400">EXAM SYSTEM v4</h1>
            <div class="space-y-4">
                <input type="text" id="student-id" placeholder="Student Name / Roll No" class="w-full p-3 rounded-xl border-2 dark:bg-gray-700 dark:border-gray-600 font-bold outline-none focus:border-blue-500">
                <div class="grid grid-cols-2 gap-3">
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Negative Mark</label>
                        <select id="neg-mark" class="p-3 rounded-xl border-2 dark:bg-gray-700 font-bold">
                            <option value="0">None</option>
                            <option value="0.25">0.25 (1/4)</option>
                            <option value="0.33">0.33 (1/3)</option>
                        </select>
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Time (Min)</label>
                        <input type="number" id="custom-time" value="20" class="p-3 rounded-xl border-2 dark:bg-gray-700 font-bold">
                    </div>
                </div>
                <button onclick="startTest()" class="w-full bg-blue-700 hover:bg-blue-800 text-white py-4 rounded-2xl font-black text-lg shadow-lg">START EXAMINATION</button>
            </div>
        </div>
    </div>

    <div id="quiz-area" class="hidden-view h-screen flex flex-col">
        <header class="bg-blue-700 dark:bg-blue-900 text-white px-4 py-3 flex justify-between items-center shadow-lg z-50">
            <div class="flex items-center gap-2">
                <span class="text-xs font-bold bg-black/20 px-2 py-1 rounded">TIMER</span>
                <div id="timer" class="text-xl font-mono font-bold">00:00</div>
            </div>
            <div class="font-black text-sm tracking-widest uppercase">Test Adda Live</div>
            <button onclick="togglePalette()" class="bg-white/20 p-2 rounded-lg no-print">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/></svg>
            </button>
        </header>

        <main class="flex-1 flex overflow-hidden relative">
            <div class="flex-1 flex flex-col bg-white dark:bg-[#1a1a1a]">
                <div class="px-4 py-2 border-b dark:border-gray-800 flex justify-between items-center bg-gray-50 dark:bg-gray-900">
                    <div class="flex items-center gap-3">
                        <span id="q-number-box" class="bg-blue-600 text-white px-3 py-1 rounded font-black">1</span>
                        <div class="text-[10px] font-bold text-gray-500 uppercase">Spent: <span id="q-timer" class="text-blue-600">00:00</span></div>
                    </div>
                    <button onclick="clearResponse()" class="text-[10px] font-black text-red-500 uppercase underline">Clear</button>
                </div>

                <div id="quiz-container" class="p-6 overflow-y-auto flex-1">
                    <p id="q-text" class="text-lg md:text-xl mb-8"></p>
                    <div id="options-container" class="space-y-4"></div>
                </div>
                
                <div class="p-4 bg-gray-50 dark:bg-gray-900 border-t dark:border-gray-800 grid grid-cols-2 gap-4 no-print">
                    <button onclick="markReview()" class="border-2 border-purple-500 text-purple-600 dark:text-purple-400 py-3 rounded-xl font-bold">MARK FOR REVIEW</button>
                    <button onclick="saveNext()" class="bg-green-600 text-white py-3 rounded-xl font-black shadow-lg">SAVE & NEXT</button>
                </div>
            </div>

            <aside id="palette-sidebar" class="fixed right-0 top-0 bottom-0 w-72 bg-white dark:bg-gray-800 shadow-2xl p-6 flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-xs text-gray-400 uppercase tracking-widest">Question Palette</h3>
                    <button onclick="togglePalette()" class="text-red-500 font-bold">✕</button>
                </div>
                <div class="bg-gray-100 dark:bg-gray-700/50 p-4 rounded-xl mb-6 grid grid-cols-2 gap-2 text-[10px] font-bold uppercase">
                    <div class="flex items-center gap-2"><span class="w-3 h-3 bg-green-500 rounded-sm"></span> Ans: <span id="count-ans">0</span></div>
                    <div class="flex items-center gap-2"><span class="w-3 h-3 bg-blue-500 rounded-sm"></span> Left: <span id="count-unans">0</span></div>
                </div>
                <div id="palette-grid" class="grid grid-cols-4 gap-3 overflow-y-auto pr-2"></div>
                <button onclick="submitQuiz()" class="mt-auto bg-red-600 text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-xl">Submit Test</button>
            </aside>
        </main>
    </div>

    <div id="analysis-view" class="hidden-view p-6 bg-gray-50 dark:bg-[#0f172a] min-h-screen overflow-y-auto">
        <div class="max-w-4xl mx-auto py-10">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 gap-4 no-print">
                <div>
                    <h2 class="text-4xl font-black text-blue-900 dark:text-blue-400">DEEP ANALYSIS</h2>
                    <p id="analysis-info" class="text-gray-500 font-bold uppercase text-xs mt-1"></p>
                </div>
                <div class="flex gap-3">
                    <button onclick="window.print()" class="bg-gray-800 text-white px-6 py-2 rounded-xl font-bold text-xs">DOWNLOAD PDF</button>
                    <button onclick="location.reload()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold text-xs">RETAKE TEST</button>
                </div>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                <div class="bg-white dark:bg-gray-800 p-6 rounded-3xl shadow-sm border-b-4 border-blue-500">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Net Score</p>
                    <h3 id="stat-score" class="text-3xl font-black text-blue-700">0.00</h3>
                </div>
                <div class="bg-white dark:bg-gray-800 p-6 rounded-3xl shadow-sm border-b-4 border-green-500">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Accuracy</p>
                    <h3 id="stat-accuracy" class="text-3xl font-black text-green-600">0%</h3>
                </div>
                <div class="bg-white dark:bg-gray-800 p-6 rounded-3xl shadow-sm border-b-4 border-purple-500">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Rank</p>
                    <div id="leaderboard-list" class="text-xs font-bold mt-2 space-y-1"></div>
                </div>
            </div>

            <div id="review-list" class="space-y-6"></div>
        </div>
    </div>

    <script>
        let testQs = []; let curIdx = 0; let userAns = []; let timerSec = 0; let clock;
        let qStartTime;

        // --- Draggable Toggle Logic ---
        const dragBox = document.getElementById('theme-toggle');
        let isDragging = false, startX, startY;

        dragBox.addEventListener('pointerdown', e => {
            isDragging = false; startX = e.clientX; startY = e.clientY;
            dragBox.setPointerCapture(e.pointerId);
        });
        dragBox.addEventListener('pointermove', e => {
            if (Math.abs(e.clientX - startX) > 5 || Math.abs(e.clientY - startY) > 5) {
                isDragging = true;
                dragBox.style.left = (e.clientX - 25) + 'px';
                dragBox.style.top = (e.clientY - 25) + 'px';
            }
        });
        dragBox.addEventListener('pointerup', () => {
            if (!isDragging) {
                document.documentElement.classList.toggle('dark');
                document.getElementById('theme-icon').innerText = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
            }
            isDragging = false;
        });

        // --- Core Quiz Logic ---
        function startTest() {
            const sName = document.getElementById('student-id').value || "Guest User";
            if(typeof questionBank === 'undefined') return alert("questions.js not found!");
            
            testQs = questionBank.sort(() => 0.5 - Math.random()).slice(0, 25);
            userAns = testQs.map(() => ({ selected: null, status: 'unvisited', timeSpent: 0 }));
            timerSec = (parseInt(document.getElementById('custom-time').value) || 20) * 60;
            
            document.getElementById('setup-screen').classList.add('hidden-view');
            document.getElementById('quiz-area').classList.remove('hidden-view');
            loadQ(0); startTimer();
        }

        function startTimer() {
            clock = setInterval(() => {
                let m = Math.floor(timerSec/60), s = timerSec%60;
                document.getElementById('timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                
                let qElapsed = Math.floor((Date.now() - qStartTime) / 1000);
                document.getElementById('q-timer').innerText = `${String(Math.floor(qElapsed/60)).padStart(2,'0')}:${String(qElapsed%60).padStart(2,'0')}`;

                if(timerSec-- <= 0) submitQuiz();
            }, 1000);
        }

        function loadQ(idx) {
            if (qStartTime) userAns[curIdx].timeSpent += Math.floor((Date.now() - qStartTime) / 1000);
            curIdx = idx; qStartTime = Date.now();
            
            const q = testQs[idx], state = userAns[idx];
            document.getElementById('q-number-box').innerText = idx + 1;
            document.getElementById('q-text').innerText = q.q;
            
            const cont = document.getElementById('options-container'); cont.innerHTML = '';
            q.o.forEach((opt, i) => {
                const sel = state.selected === i;
                cont.innerHTML += `<div onclick="pick(${i})" class="p-4 border-2 rounded-2xl cursor-pointer flex items-center gap-4 transition-all ${sel ? 'border-blue-600 bg-blue-50 dark:bg-blue-900/30 shadow-inner' : 'border-gray-100 dark:border-gray-700 hover:bg-gray-50'}">
                    <span class="w-8 h-8 rounded-full border-2 flex items-center justify-center font-bold ${sel ? 'bg-blue-600 text-white border-blue-600' : 'text-gray-400'}">${i+1}</span>
                    <span class="font-bold text-base">${opt}</span>
                </div>`;
            });
            renderPal();
        }

        function pick(i) { userAns[curIdx].selected = i; loadQ(curIdx); }
        function clearResponse() { userAns[curIdx].selected = null; userAns[curIdx].status = 'unvisited'; loadQ(curIdx); }
        function saveNext() { 
            userAns[curIdx].status = userAns[curIdx].selected !== null ? 'answered' : 'not-answered';
            if(curIdx < testQs.length-1) loadQ(curIdx+1); else togglePalette(); 
        }
        function markReview() { 
            userAns[curIdx].status = 'review'; 
            if(curIdx < testQs.length-1) loadQ(curIdx+1); else togglePalette();
        }
        function togglePalette() { document.getElementById('palette-sidebar').classList.toggle('open'); }
        
        function renderPal() {
            const grid = document.getElementById('palette-grid'); grid.innerHTML = '';
            let ansCount = 0;
            userAns.forEach((s, i) => {
                let cls = 'status-unvisited';
                if(s.status === 'answered') { cls = 'status-answered'; ansCount++; }
                else if(s.status === 'review') cls = 'status-review' + (s.selected !== null ? ' has-ans' : '');
                else if(s.status === 'not-answered') cls = 'status-not-answered';
                grid.innerHTML += `<button onclick="loadQ(${i}); togglePalette()" class="${cls} ${curIdx === i ? 'ring-4 ring-blue-300' : ''}">${i+1}</button>`;
            });
            document.getElementById('count-ans').innerText = ansCount;
            document.getElementById('count-unans').innerText = testQs.length - ansCount;
        }

        function submitQuiz() {
            if(!confirm("Submit your examination?")) return;
            userAns[curIdx].timeSpent += Math.floor((Date.now() - qStartTime) / 1000);
            clearInterval(clock);
            
            document.getElementById('quiz-area').classList.add('hidden-view');
            document.getElementById('analysis-view').classList.remove('hidden-view');
            
            let correct = 0, wrong = 0;
            const neg = parseFloat(document.getElementById('neg-mark').value);
            const rList = document.getElementById('review-list'); rList.innerHTML = '';

            userAns.forEach((s, i) => {
                const q = testQs[i];
                const isCorrect = s.selected === q.a;
                if(s.selected !== null) isCorrect ? correct++ : wrong++;
                
                rList.innerHTML += `<div class="bg-white dark:bg-gray-800 p-6 rounded-3xl shadow-sm border-l-8 ${s.selected===null?'border-gray-300':isCorrect?'border-green-500':'border-red-500'}">
                    <div class="flex justify-between items-center mb-4">
                        <span class="font-black text-blue-600">QUESTION ${i+1}</span>
                        <span class="text-[10px] font-mono bg-gray-100 dark:bg-gray-700 px-2 py-1 rounded">SPENT: ${s.timeSpent}s</span>
                    </div>
                    <p class="font-bold mb-4 dark:text-gray-200">${q.q}</p>
                    <div class="space-y-1 text-sm">
                        <p class="${isCorrect?'text-green-600':'text-red-600'} font-bold">Your Ans: ${s.selected!==null?q.o[s.selected]:'Skipped'}</p>
                        <p class="text-blue-600 font-bold">Correct Ans: ${q.o[q.a]}</p>
                    </div>
                    <div class="mt-4 p-4 bg-blue-50 dark:bg-gray-900/50 rounded-2xl text-xs italic text-gray-500 border border-blue-100">
                        <b class="block not-italic text-blue-800 mb-1">Explanation:</b> ${q.sol}
                    </div>
                </div>`;
            });
            
            const score = (correct - (wrong * neg)).toFixed(2);
            document.getElementById('stat-score').innerText = score;
            document.getElementById('stat-accuracy').innerText = Math.round((correct/(correct+wrong))*100 || 0) + "%";
            document.getElementById('analysis-info').innerText = `Student: ${document.getElementById('student-id').value} | Questions: ${testQs.length}`;

            // Leaderboard (Local)
            let highScores = JSON.parse(localStorage.getItem('test_adda_ranks') || '[]');
            highScores.push({ name: document.getElementById('student-id').value || "Guest", score: score });
            highScores.sort((a,b) => b.score - a.score);
            localStorage.setItem('test_adda_ranks', JSON.stringify(highScores.slice(0, 5)));
            
            document.getElementById('leaderboard-list').innerHTML = highScores.slice(0, 5).map((h, i) => 
                `<div class="flex justify-between"><span>#${i+1} ${h.name}</span><span>${h.score}</span></div>`
            ).join('');
        }
    </script>
</body>
</html>
